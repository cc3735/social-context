version: "3.9"

services:
  social-context:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - THOUGHTVAULT_RAG_URL=${THOUGHTVAULT_RAG_URL:-http://localhost:8000}
      - HOST=0.0.0.0
      - PORT=8004
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: social-context-network
